name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build Blog
        run: pnpm --filter blog run build
        env:
          VITE_BASE_URL: /

      - name: Build KnowledgeBase
        run: pnpm --filter knowledge-base run build
        env:
          VITEPRESS_BASE: /kb/
          VITEPRESS_BLOG_URL: /

      - name: Merge dist directories
        run: |
          mkdir -p dist
          cp -r apps/Blog/dist/* dist/
          cp -r apps/KnowledgeBase/.vitepress/dist/* dist/kb/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
